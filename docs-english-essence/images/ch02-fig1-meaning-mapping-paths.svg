  <rect x="30" y="178" width="380" height="55" rx="6" fill="#2d5a88"/>
  <text x="220" y="211" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#ffffff">中文表达「这个日落好美」</text>
