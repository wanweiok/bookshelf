  </defs>
  <rect width="860" height="300" fill="#f0f0f0" rx="6"/>
  <text x="430" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1a3a5c">「意」与中英文映射路径</text>
  <rect x="230" y="42" width="400" height="78" rx="6" fill="#1a3a5c"/>
  <text x="430" y="72" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff">「意」</text>
  <text x="430" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#b0c4de">前语言心智表征：视觉 · 情感 · 空间 · 逻辑 · 身体感知</text>
