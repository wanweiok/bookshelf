<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" width="860" height="520">
  <defs>
    <marker id="arrow-dash" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#888"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="520" rx="10" fill="#f8f9fb"/>

  <!-- Title -->
  <text x="430" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a3a5c">文化图式层与语义网络层：双层结构</text>

  <!-- ====== Upper Layer: Cultural Schema (骨架层) ====== -->
  <rect x="30" y="56" width="800" height="190" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.2" opacity="0.35"/>
  <text x="60" y="80" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2e7d32">上层 · 骨架层 — 文化图式</text>

  <!-- Schema nodes -->
  <rect x="60"  y="100" width="120" height="44" rx="6" fill="#2e7d32" filter="url(#shadow)"/>
  <text x="120" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff">个人主义</text>

  <rect x="220" y="100" width="120" height="44" rx="6" fill="#2e7d32" filter="url(#shadow)"/>
  <text x="280" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff">契约精神</text>

  <rect x="380" y="100" width="120" height="44" rx="6" fill="#2e7d32" filter="url(#shadow)"/>
  <text x="440" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff">经验主义</text>

  <rect x="540" y="100" width="120" height="44" rx="6" fill="#2e7d32" filter="url(#shadow)"/>
  <text x="600" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff">公平竞争</text>

  <rect x="700" y="100" width="120" height="44" rx="6" fill="#2e7d32" filter="url(#shadow)"/>
  <text x="760" y="127" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff">法治传统</text>

  <!-- Inter-schema connections (horizontal lines) -->
  <line x1="180" y1="122" x2="220" y2="122" stroke="#388e3c" stroke-width="1.5"/>
  <line x1="340" y1="122" x2="380" y2="122" stroke="#388e3c" stroke-width="1.5"/>
  <line x1="500" y1="122" x2="540" y2="122" stroke="#388e3c" stroke-width="1.5"/>
  <line x1="660" y1="122" x2="700" y2="122" stroke="#388e3c" stroke-width="1.5"/>
  <!-- Cross connections -->
  <line x1="180" y1="135" x2="380" y2="110" stroke="#388e3c" stroke-width="0.8" opacity="0.5"/>
  <line x1="340" y1="135" x2="540" y2="110" stroke="#388e3c" stroke-width="0.8" opacity="0.5"/>
  <line x1="500" y1="135" x2="700" y2="110" stroke="#388e3c" stroke-width="0.8" opacity="0.5"/>

  <!-- Schema layer label -->
  <text x="430" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2e7d32" opacity="0.7">深层认知框架 · 决定语言的底层逻辑</text>

  <!-- ====== Separator ====== -->
  <line x1="60" y1="260" x2="800" y2="260" stroke="#bbb" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="430" y="276" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#888">虚线箭头 = 词汇映射到文化图式</text>

  <!-- ====== Lower Layer: Lexical Nodes (肌肉层) ====== -->
  <rect x="30" y="290" width="800" height="190" rx="10" fill="#fff3e0" stroke="#8d6e63" stroke-width="1.2" opacity="0.35"/>
  <text x="60" y="314" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#5d4037">下层 · 肌肉层 — 词汇/语义网络</text>

  <!-- Lexical nodes -->
  <rect x="60"  y="334" width="120" height="44" rx="6" fill="#6d4c41" filter="url(#shadow)"/>
  <text x="120" y="361" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff">fair</text>

  <rect x="220" y="334" width="140" height="44" rx="6" fill="#6d4c41" filter="url(#shadow)"/>
  <text x="290" y="361" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff">accountability</text>

  <rect x="400" y="334" width="120" height="44" rx="6" fill="#6d4c41" filter="url(#shadow)"/>
  <text x="460" y="361" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff">privacy</text>

  <rect x="560" y="334" width="120" height="44" rx="6" fill="#6d4c41" filter="url(#shadow)"/>
  <text x="620" y="361" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff">I think</text>

  <rect x="720" y="334" width="120" height="44" rx="6" fill="#6d4c41" filter="url(#shadow)"/>
  <text x="780" y="361" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff">it turns out</text>

  <!-- Schema layer label -->
  <text x="430" y="414" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5d4037" opacity="0.7">表层词汇 · 承载文化含义的具体表达</text>

  <!-- ====== Dashed arrows: lexical → schema ====== -->
  <!-- fair → 公平竞争 -->
  <line x1="120" y1="334" x2="600" y2="144" stroke="#888" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-dash)"/>
  <!-- accountability → 契约精神 -->
  <line x1="290" y1="334" x2="280" y2="144" stroke="#888" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-dash)"/>
  <!-- privacy → 个人主义 -->
  <line x1="460" y1="334" x2="120" y2="144" stroke="#888" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-dash)"/>
  <!-- I think → 经验主义 -->
  <line x1="620" y1="334" x2="440" y2="144" stroke="#888" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-dash)"/>
  <!-- it turns out → 经验主义 -->
  <line x1="780" y1="334" x2="460" y2="144" stroke="#888" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-dash)"/>

  <!-- Legend -->
  <rect x="60" y="470" width="16" height="16" rx="3" fill="#2e7d32"/>
  <text x="82" y="483" font-family="Arial, sans-serif" font-size="12" fill="#333">文化图式节点</text>
  <rect x="190" y="470" width="16" height="16" rx="3" fill="#6d4c41"/>
  <text x="212" y="483" font-family="Arial, sans-serif" font-size="12" fill="#333">词汇节点</text>
  <line x1="310" y1="478" x2="350" y2="478" stroke="#888" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-dash)"/>
  <text x="358" y="483" font-family="Arial, sans-serif" font-size="12" fill="#333">词汇→图式映射</text>
  <line x1="490" y1="478" x2="530" y2="478" stroke="#388e3c" stroke-width="1.5"/>
  <text x="538" y="483" font-family="Arial, sans-serif" font-size="12" fill="#333">图式间关联</text>
</svg>