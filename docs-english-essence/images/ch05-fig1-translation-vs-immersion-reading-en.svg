<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" width="860" height="440">
  <defs>
    <marker id="arr-brown" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#8d6e63"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#388e3c"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="440" rx="10" fill="#f8f9fb"/>

  <!-- Title -->
  <text x="430" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1a3a5c">Translation Reading vs Immersion Reading</text>

  <!-- ====== Upper: Translation Reading (Brown) ====== -->
  <rect x="30" y="54" width="800" height="150" rx="10" fill="#fff3e0" stroke="#8d6e63" stroke-width="1.2" opacity="0.4"/>
  <text x="60" y="78" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#5d4037">Translation Reading (Slow, Tiring)</text>

  <!-- Nodes -->
  <rect x="50"  y="96" width="130" height="44" rx="6" fill="#8d6e63" filter="url(#shadow)"/>
  <text x="115" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fff">English Text</text>

  <rect x="230" y="96" width="150" height="44" rx="6" fill="#a1887f" filter="url(#shadow)"/>
  <text x="305" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fff">Translate to L1</text>

  <rect x="430" y="96" width="160" height="44" rx="6" fill="#a1887f" filter="url(#shadow)"/>
  <text x="510" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fff">Extract Meaning from L1</text>

  <rect x="640" y="96" width="120" height="44" rx="6" fill="#6d4c41" filter="url(#shadow)"/>
  <text x="700" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fff">Comprehension ✓</text>

  <!-- Arrows -->
  <line x1="180" y1="118" x2="228" y2="118" stroke="#8d6e63" stroke-width="2" marker-end="url(#arr-brown)"/>
  <line x1="380" y1="118" x2="428" y2="118" stroke="#8d6e63" stroke-width="2" marker-end="url(#arr-brown)"/>
  <line x1="590" y1="118" x2="638" y2="118" stroke="#8d6e63" stroke-width="2" marker-end="url(#arr-brown)"/>

  <!-- Tag -->
  <rect x="650" y="148" width="100" height="24" rx="12" fill="#e8a838" opacity="0.85"/>
  <text x="700" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">Slow · High Load</text>

  <!-- ====== Separator ====== -->
  <text x="430" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#888">⬇  Goal: Evolve from upper path to lower path  ⬇</text>

  <!-- ====== Lower: Immersion Reading (Green) ====== -->
  <rect x="30" y="250" width="800" height="150" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.2" opacity="0.4"/>
  <text x="60" y="274" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2e7d32">Immersion Reading (Fast, Natural, Flow)</text>

  <!-- Nodes -->
  <rect x="100" y="292" width="130" height="44" rx="6" fill="#388e3c" filter="url(#shadow)"/>
  <text x="165" y="319" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fff">English Text</text>

  <rect x="340" y="292" width="170" height="44" rx="6" fill="#43a047" filter="url(#shadow)"/>
  <text x="425" y="319" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fff">Directly Trigger Meaning</text>

  <rect x="620" y="292" width="120" height="44" rx="6" fill="#2e7d32" filter="url(#shadow)"/>
  <text x="680" y="319" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fff">Comprehension ✓</text>

  <!-- Arrows -->
  <line x1="230" y1="314" x2="338" y2="314" stroke="#388e3c" stroke-width="2.5" marker-end="url(#arr-green)"/>
  <line x1="510" y1="314" x2="618" y2="314" stroke="#388e3c" stroke-width="2.5" marker-end="url(#arr-green)"/>

  <!-- Tag -->
  <rect x="630" y="344" width="100" height="24" rx="12" fill="#50b87a" opacity="0.85"/>
  <text x="680" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">Fast · Low Load</text>

  <!-- Legend -->
  <rect x="60" y="412" width="16" height="16" rx="3" fill="#8d6e63"/>
  <text x="82" y="425" font-family="Arial, sans-serif" font-size="12" fill="#333">Translation Path</text>
  <rect x="200" y="412" width="16" height="16" rx="3" fill="#388e3c"/>
  <text x="222" y="425" font-family="Arial, sans-serif" font-size="12" fill="#333">Immersion Path</text>
</svg>