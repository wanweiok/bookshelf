<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" width="860" height="440">
  <defs>
    <marker id="arr-brown" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#8d6e63"/>
    </marker>
    <marker id="arr-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#388e3c"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="440" rx="10" fill="#f8f9fb"/>

  <!-- Title -->
  <text x="430" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a3a5c">翻译式阅读 vs 沉浸式阅读</text>

  <!-- ====== Upper: Translation Reading (棕色系) ====== -->
  <rect x="30" y="54" width="800" height="150" rx="10" fill="#fff3e0" stroke="#8d6e63" stroke-width="1.2" opacity="0.4"/>
  <text x="60" y="78" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#5d4037">翻译式阅读（慢，累）</text>

  <!-- Nodes -->
  <rect x="50"  y="96" width="130" height="44" rx="6" fill="#8d6e63" filter="url(#shadow)"/>
  <text x="115" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff">英文文本</text>

  <rect x="230" y="96" width="150" height="44" rx="6" fill="#a1887f" filter="url(#shadow)"/>
  <text x="305" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff">逐句翻译为中文</text>

  <rect x="430" y="96" width="150" height="44" rx="6" fill="#a1887f" filter="url(#shadow)"/>
  <text x="505" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff">从中文提取意义</text>

  <rect x="630" y="96" width="110" height="44" rx="6" fill="#6d4c41" filter="url(#shadow)"/>
  <text x="685" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff">理解 ✓</text>

  <!-- Arrows -->
  <line x1="180" y1="118" x2="228" y2="118" stroke="#8d6e63" stroke-width="2" marker-end="url(#arr-brown)"/>
  <line x1="380" y1="118" x2="428" y2="118" stroke="#8d6e63" stroke-width="2" marker-end="url(#arr-brown)"/>
  <line x1="580" y1="118" x2="628" y2="118" stroke="#8d6e63" stroke-width="2" marker-end="url(#arr-brown)"/>

  <!-- Tag: slow -->
  <rect x="640" y="148" width="90" height="24" rx="12" fill="#e8a838" opacity="0.85"/>
  <text x="685" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">慢 · 认知负荷高</text>

  <!-- ====== Separator ====== -->
  <text x="430" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#888">⬇  目标：从上方路径进化为下方路径  ⬇</text>

  <!-- ====== Lower: Immersion Reading (绿色系) ====== -->
  <rect x="30" y="250" width="800" height="150" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.2" opacity="0.4"/>
  <text x="60" y="274" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2e7d32">沉浸式阅读（快，自然，沉浸）</text>

  <!-- Nodes -->
  <rect x="100" y="292" width="130" height="44" rx="6" fill="#388e3c" filter="url(#shadow)"/>
  <text x="165" y="319" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff">英文文本</text>

  <rect x="340" y="292" width="160" height="44" rx="6" fill="#43a047" filter="url(#shadow)"/>
  <text x="420" y="319" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff">直接触发意义</text>

  <rect x="610" y="292" width="110" height="44" rx="6" fill="#2e7d32" filter="url(#shadow)"/>
  <text x="665" y="319" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#fff">理解 ✓</text>

  <!-- Arrows -->
  <line x1="230" y1="314" x2="338" y2="314" stroke="#388e3c" stroke-width="2.5" marker-end="url(#arr-green)"/>
  <line x1="500" y1="314" x2="608" y2="314" stroke="#388e3c" stroke-width="2.5" marker-end="url(#arr-green)"/>

  <!-- Tag: fast -->
  <rect x="620" y="344" width="90" height="24" rx="12" fill="#50b87a" opacity="0.85"/>
  <text x="665" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#fff">快 · 低负荷</text>

  <!-- Legend -->
  <rect x="60" y="412" width="16" height="16" rx="3" fill="#8d6e63"/>
  <text x="82" y="425" font-family="Arial, sans-serif" font-size="12" fill="#333">翻译式路径</text>
  <rect x="180" y="412" width="16" height="16" rx="3" fill="#388e3c"/>
  <text x="202" y="425" font-family="Arial, sans-serif" font-size="12" fill="#333">沉浸式路径</text>
</svg>