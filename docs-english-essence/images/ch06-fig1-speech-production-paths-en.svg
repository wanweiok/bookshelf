<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 500" width="860" height="500">
  <defs>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#2d5a88"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#e8a838"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#e05555"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="860" height="500" rx="10" fill="#f8f9fb"/>

  <!-- Title -->
  <text x="430" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1a3a5c">Direct Path vs Translation Path: Speech Production Model</text>

  <!-- ====== Upper: Direct Path (Blue/Green) ====== -->
  <rect x="30" y="54" width="800" height="148" rx="10" fill="#e3f2fd" stroke="#2d5a88" stroke-width="1.2" opacity="0.4"/>
  <text x="60" y="78" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#1a3a5c">Direct Path (Fluent, Natural)</text>

  <!-- Direct path nodes -->
  <rect x="40"  y="96" width="80" height="44" rx="6" fill="#1a3a5c" filter="url(#shadow)"/>
  <text x="80"  y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fff">Intent</text>

  <rect x="170" y="96" width="130" height="44" rx="6" fill="#2d5a88" filter="url(#shadow)"/>
  <text x="235" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fff">EN Lexicon Activation</text>
  <text x="235" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#b0c4de">Conceptualize</text>

  <rect x="350" y="96" width="140" height="44" rx="6" fill="#2d5a88" filter="url(#shadow)"/>
  <text x="420" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fff">EN Language Plan</text>
  <text x="420" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#b0c4de">Formulate</text>

  <rect x="540" y="96" width="130" height="44" rx="6" fill="#2d5a88" filter="url(#shadow)"/>
  <text x="605" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fff">EN Speech Output</text>
  <text x="605" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#b0c4de">Articulate</text>

  <rect x="720" y="96" width="90" height="44" rx="6" fill="#50b87a" filter="url(#shadow)"/>
  <text x="765" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fff">Output ✓</text>

  <!-- Direct arrows -->
  <line x1="120" y1="118" x2="168" y2="118" stroke="#2d5a88" stroke-width="2" marker-end="url(#arr-blue)"/>
  <line x1="300" y1="118" x2="348" y2="118" stroke="#2d5a88" stroke-width="2" marker-end="url(#arr-blue)"/>
  <line x1="490" y1="118" x2="538" y2="118" stroke="#2d5a88" stroke-width="2" marker-end="url(#arr-blue)"/>
  <line x1="670" y1="118" x2="718" y2="118" stroke="#50b87a" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Tag -->
  <rect x="720" y="148" width="90" height="22" rx="11" fill="#50b87a" opacity="0.85"/>
  <text x="765" y="163" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">Fast · Fluent</text>

  <!-- ====== Separator ====== -->
  <text x="430" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#888">⬆ Target path  |  ⬇ Beginner path (extra cross-language transfer)</text>

  <!-- ====== Lower: Translation Path (Orange/Red) ====== -->
  <rect x="30" y="250" width="800" height="200" rx="10" fill="#fff8e1" stroke="#e8a838" stroke-width="1.2" opacity="0.4"/>
  <text x="60" y="274" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#e65100">Translation Path (Slow, Halting, Unnatural)</text>

  <!-- Translation path nodes - row 1 -->
  <rect x="40"  y="292" width="80" height="44" rx="6" fill="#1a3a5c" filter="url(#shadow)"/>
  <text x="80"  y="319" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fff">Intent</text>

  <rect x="158" y="292" width="130" height="44" rx="6" fill="#e8a838" filter="url(#shadow)"/>
  <text x="223" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fff">L1 Lexicon Activation</text>
  <text x="223" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff8e1">Conceptualize</text>

  <rect x="326" y="292" width="140" height="44" rx="6" fill="#e05555" filter="url(#shadow)"/>
  <text x="396" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fff">Cross-Lingual Transfer</text>
  <text x="396" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ffcdd2">Bottleneck ⚠</text>

  <rect x="504" y="292" width="120" height="44" rx="6" fill="#e8a838" filter="url(#shadow)"/>
  <text x="564" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fff">EN Lexical Retrieval</text>
  <text x="564" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff8e1">Transfer</text>

  <!-- Translation path nodes - row 2 -->
  <rect x="260" y="370" width="140" height="44" rx="6" fill="#2d5a88" filter="url(#shadow)"/>
  <text x="330" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fff">EN Language Plan</text>
  <text x="330" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#b0c4de">Formulate</text>

  <rect x="450" y="370" width="130" height="44" rx="6" fill="#2d5a88" filter="url(#shadow)"/>
  <text x="515" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fff">EN Speech Output</text>
  <text x="515" y="406" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#b0c4de">Articulate</text>

  <rect x="630" y="370" width="90" height="44" rx="6" fill="#50b87a" filter="url(#shadow)"/>
  <text x="675" y="397" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#fff">Output ✓</text>

  <!-- Row 1 arrows -->
  <line x1="120" y1="314" x2="156" y2="314" stroke="#e8a838" stroke-width="2" marker-end="url(#arr-orange)"/>
  <line x1="288" y1="314" x2="324" y2="314" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>
  <line x1="466" y1="314" x2="502" y2="314" stroke="#e8a838" stroke-width="2" marker-end="url(#arr-orange)"/>

  <!-- Row 1 → Row 2 connector -->
  <path d="M624,314 Q650,314 650,350 Q650,392 448,392" fill="none" stroke="#2d5a88" stroke-width="2"/>
  <line x1="564" y1="336" x2="330" y2="370" stroke="#2d5a88" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Row 2 arrows -->
  <line x1="400" y1="392" x2="448" y2="392" stroke="#2d5a88" stroke-width="2" marker-end="url(#arr-blue)"/>
  <line x1="580" y1="392" x2="628" y2="392" stroke="#2d5a88" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Tag -->
  <rect x="630" y="422" width="90" height="22" rx="11" fill="#e05555" opacity="0.85"/>
  <text x="675" y="437" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#fff">Slow · Halting</text>

  <!-- Legend -->
  <rect x="40" y="468" width="16" height="16" rx="3" fill="#2d5a88"/>
  <text x="62" y="481" font-family="Arial, sans-serif" font-size="12" fill="#333">Direct Stage</text>
  <rect x="160" y="468" width="16" height="16" rx="3" fill="#e8a838"/>
  <text x="182" y="481" font-family="Arial, sans-serif" font-size="12" fill="#333">L1 Mediation Stage</text>
  <rect x="320" y="468" width="16" height="16" rx="3" fill="#e05555"/>
  <text x="342" y="481" font-family="Arial, sans-serif" font-size="12" fill="#333">Bottleneck: Cross-Lingual</text>
  <rect x="520" y="468" width="16" height="16" rx="3" fill="#50b87a"/>
  <text x="542" y="481" font-family="Arial, sans-serif" font-size="12" fill="#333">Final Output</text>
</svg>