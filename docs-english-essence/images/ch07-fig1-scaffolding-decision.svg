<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 620" width="860" height="620">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2d5a88"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#50b87a"/></marker>
  </defs>
  <rect width="860" height="620" rx="12" fill="#f0f0f0"/>
  <text x="430" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a3a5c">认知脚手架决策流程</text>
  <!-- Start -->
  <rect x="330" y="60" width="200" height="44" rx="22" fill="#5b9bd5" stroke="#2d5a88" stroke-width="1.5"/>
  <text x="430" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#ffffff">遇到认知挑战</text>
  <!-- Arrow down -->
  <line x1="430" y1="104" x2="430" y2="140" stroke="#2d5a88" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Diamond -->
  <polygon points="430,140 560,200 430,260 300,200" fill="#e8a838" stroke="#1a3a5c" stroke-width="1.5"/>
  <text x="430" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a3a5c">英文能力是否足够</text>
  <text x="430" y="212" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1a3a5c">独立处理？</text>
  <!-- Yes branch - right -->
  <line x1="560" y1="200" x2="700" y2="200" stroke="#50b87a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="620" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#50b87a" font-weight="bold">是</text>
  <rect x="700" y="176" width="140" height="48" rx="6" fill="#50b87a" stroke="#1a3a5c" stroke-width="1.5"/>
  <text x="770" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">直接用英文处理</text>
  <text x="770" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#ffffff">（直连通路）</text>
  <!-- No branch - down -->
  <line x1="430" y1="260" x2="430" y2="300" stroke="#e05555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="445" y="285" font-family="Arial, sans-serif" font-size="13" fill="#e05555" font-weight="bold">否</text>
  <!-- Step 1 -->
  <rect x="310" y="300" width="240" height="44" rx="6" fill="#2d5a88" stroke="#1a3a5c" stroke-width="1.5"/>
  <text x="430" y="327" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">用中文搭建脚手架</text>
  <line x1="430" y1="344" x2="430" y2="374" stroke="#2d5a88" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Step 2 -->
  <rect x="310" y="374" width="240" height="44" rx="6" fill="#2d5a88" stroke="#1a3a5c" stroke-width="1.5"/>
  <text x="430" y="401" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">用英文重新建构表达</text>
  <line x1="430" y1="418" x2="430" y2="448" stroke="#2d5a88" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Step 3 -->
  <rect x="310" y="448" width="240" height="44" rx="6" fill="#5b9bd5" stroke="#2d5a88" stroke-width="1.5"/>
  <text x="430" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">在英文语境中巩固</text>
  <line x1="430" y1="492" x2="430" y2="522" stroke="#2d5a88" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Step 4 -->
  <rect x="280" y="522" width="300" height="44" rx="6" fill="#5b9bd5" stroke="#2d5a88" stroke-width="1.5"/>
  <text x="430" y="549" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">下次同类任务尝试减少中文</text>
  <!-- Loop back arrow -->
  <line x1="280" y1="544" x2="140" y2="544" stroke="#2d5a88" stroke-width="2"/>
  <line x1="140" y1="544" x2="140" y2="200" stroke="#2d5a88" stroke-width="2"/>
  <line x1="140" y1="200" x2="300" y2="200" stroke="#2d5a88" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="130" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#2d5a88" transform="rotate(-90,130,380)">循环迭代</text>
</svg>