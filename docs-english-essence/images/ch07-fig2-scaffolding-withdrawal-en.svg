<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 520" width="860" height="520">
  <defs>
    <marker id="arrow-dash" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2d5a88"/></marker>
  </defs>
  <rect width="860" height="520" rx="12" fill="#f0f0f0"/>
  <text x="430" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1a3a5c">Three Phases of L1 Scaffold Withdrawal</text>
  <!-- Phase 1 -->
  <rect x="30" y="70" width="250" height="340" rx="6" fill="#ffffff" stroke="#2d5a88" stroke-width="2"/>
  <rect x="30" y="70" width="250" height="46" rx="6" fill="#2d5a88"/>
  <text x="155" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#ffffff" font-weight="bold">Phase 1</text>
  <text x="155" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a3a5c" font-weight="bold">L1 Framework + L2 Fill</text>
  <rect x="55" y="165" width="200" height="40" rx="6" fill="#e8a838" opacity="0.9"/>
  <text x="155" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ffffff">L1 Conceptual Skeleton</text>
  <line x1="155" y1="205" x2="155" y2="225" stroke="#2d5a88" stroke-width="1.5" marker-end="url(#arrow-dash)"/>
  <rect x="55" y="225" width="200" height="40" rx="6" fill="#5b9bd5"/>
  <text x="155" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ffffff">L2 Content Fill-in</text>
  <!-- Ratio bar -->
  <text x="155" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a3a5c">L1 / L2 Ratio</text>
  <rect x="55" y="305" width="120" height="16" rx="4" fill="#e8a838"/>
  <rect x="175" y="305" width="80" height="16" rx="4" fill="#5b9bd5"/>
  <text x="115" y="317" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ffffff">L1 60%</text>
  <text x="215" y="317" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ffffff">L2 40%</text>
  <!-- Phase 2 -->
  <rect x="305" y="70" width="250" height="340" rx="6" fill="#ffffff" stroke="#5b9bd5" stroke-width="2"/>
  <rect x="305" y="70" width="250" height="46" rx="6" fill="#5b9bd5"/>
  <text x="430" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#ffffff" font-weight="bold">Phase 2</text>
  <text x="430" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a3a5c" font-weight="bold">L2 Framework + L1 Patches</text>
  <rect x="330" y="165" width="200" height="40" rx="6" fill="#5b9bd5"/>
  <text x="430" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ffffff">L2-Dominant Thinking</text>
  <line x1="430" y1="205" x2="430" y2="225" stroke="#2d5a88" stroke-width="1.5" marker-end="url(#arrow-dash)"/>
  <rect x="330" y="225" width="200" height="40" rx="6" fill="#e8a838" opacity="0.6"/>
  <text x="430" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ffffff">Occasional L1 Fallback</text>
  <!-- Ratio bar -->
  <text x="430" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a3a5c">L1 / L2 Ratio</text>
  <rect x="330" y="305" width="60" height="16" rx="4" fill="#e8a838"/>
  <rect x="390" y="305" width="140" height="16" rx="4" fill="#5b9bd5"/>
  <text x="360" y="317" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ffffff">L1 30%</text>
  <text x="460" y="317" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ffffff">L2 70%</text>
  <!-- Phase 3 -->
  <rect x="580" y="70" width="250" height="340" rx="6" fill="#ffffff" stroke="#50b87a" stroke-width="2"/>
  <rect x="580" y="70" width="250" height="46" rx="6" fill="#50b87a"/>
  <text x="705" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#ffffff" font-weight="bold">Phase 3</text>
  <text x="705" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a3a5c" font-weight="bold">Full L2 Operation</text>
  <rect x="605" y="165" width="200" height="40" rx="6" fill="#50b87a"/>
  <text x="705" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#ffffff">L2 Default Pathway</text>
  <line x1="705" y1="205" x2="705" y2="225" stroke="#2d5a88" stroke-width="1.5" marker-end="url(#arrow-dash)"/>
  <rect x="605" y="225" width="200" height="40" rx="6" fill="#e8a838" opacity="0.3"/>
  <text x="705" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a3a5c">L1 Reference Only</text>
  <!-- Ratio bar -->
  <text x="705" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a3a5c">L1 / L2 Ratio</text>
  <rect x="605" y="305" width="20" height="16" rx="4" fill="#e8a838"/>
  <rect x="625" y="305" width="180" height="16" rx="4" fill="#50b87a"/>
  <text x="615" y="317" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff">5%</text>
  <text x="715" y="317" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#ffffff">L2 95%</text>
  <!-- Dashed arrows between phases -->
  <line x1="280" y1="240" x2="305" y2="240" stroke="#2d5a88" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-dash)"/>
  <line x1="555" y1="240" x2="580" y2="240" stroke="#2d5a88" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-dash)"/>
  <!-- Bottom labels -->
  <text x="430" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#2d5a88">━ ━ ━ ━ ━ ━ ━ ━ ━ ▶  Deliberately Increase L2 Usage</text>
  <text x="430" y="475" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#e8a838">━ ━ ━ ━ ━ ━ ━ ━ ━ ▶  Progressively Reduce L1 Reliance</text>
</svg>