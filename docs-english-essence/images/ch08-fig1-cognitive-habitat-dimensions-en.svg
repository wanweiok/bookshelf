<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 660" width="860" height="660">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2d5a88"/></marker>
  </defs>
  <rect width="860" height="660" rx="12" fill="#f0f0f0"/>
  <text x="430" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1a3a5c">Four Dimensions of the Cognitive Habitat</text>
  <!-- Center circle -->
  <circle cx="430" cy="310" r="70" fill="#1a3a5c" stroke="#2d5a88" stroke-width="2"/>
  <text x="430" y="303" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">Cognitive</text>
  <text x="430" y="323" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">Habitat</text>
  <!-- Top: Media Input -->
  <line x1="430" y1="240" x2="430" y2="145" stroke="#2d5a88" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="300" y="68" width="260" height="76" rx="6" fill="#2d5a88" stroke="#1a3a5c" stroke-width="1.5"/>
  <text x="430" y="92" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">Media Input</text>
  <text x="430" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5b9bd5">News / Podcasts / Videos</text>
  <text x="430" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#50b87a">▸ BBC / Reddit / YouTube</text>
  <!-- Bottom: Inner Thought -->
  <line x1="430" y1="380" x2="430" y2="478" stroke="#2d5a88" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="300" y="478" width="260" height="76" rx="6" fill="#2d5a88" stroke="#1a3a5c" stroke-width="1.5"/>
  <text x="430" y="502" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">Inner Thought</text>
  <text x="430" y="522" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5b9bd5">Reflection / Planning / Monologue</text>
  <text x="430" y="542" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#50b87a">▸ Switch to English self-talk</text>
  <!-- Left: Social Interaction -->
  <line x1="360" y1="310" x2="255" y2="310" stroke="#2d5a88" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="20" y="262" width="234" height="96" rx="6" fill="#5b9bd5" stroke="#2d5a88" stroke-width="1.5"/>
  <text x="137" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">Social Interaction</text>
  <text x="137" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a3a5c">Communities / Meetings</text>
  <text x="137" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a3a5c">▸ Discord /</text>
  <text x="137" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a3a5c">Language Exchange</text>
  <!-- Right: Work Scene -->
  <line x1="500" y1="310" x2="605" y2="310" stroke="#2d5a88" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="606" y="262" width="234" height="96" rx="6" fill="#5b9bd5" stroke="#2d5a88" stroke-width="1.5"/>
  <text x="723" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" font-weight="bold">Work Context</text>
  <text x="723" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a3a5c">Docs / Notes / Code</text>
  <text x="723" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a3a5c">▸ Switch all to English</text>
  <!-- Bottom hint -->
  <rect x="220" y="590" width="420" height="40" rx="20" fill="#50b87a" opacity="0.15" stroke="#50b87a" stroke-width="1"/>
  <text x="430" y="615" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#50b87a" font-weight="bold">Replace each dimension gradually to build a full-English ecosystem</text>
</svg>