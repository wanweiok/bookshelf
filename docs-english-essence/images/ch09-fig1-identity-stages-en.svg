<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" width="860" height="400">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2d5a88"/></marker>
  </defs>
  <rect width="860" height="400" rx="12" fill="#f0f0f0"/>
  <text x="430" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="bold" fill="#1a3a5c">Three Identity Stages of an English Learner</text>
  <!-- Stage 1: Learner (Red) -->
  <rect x="40" y="70" width="230" height="200" rx="6" fill="#ffffff" stroke="#e05555" stroke-width="2.5"/>
  <rect x="40" y="70" width="230" height="50" rx="6" fill="#e05555"/>
  <text x="155" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#ffffff" font-weight="bold">English Learner</text>
  <text x="155" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a3a5c">Stage 1</text>
  <line x1="60" y1="165" x2="250" y2="165" stroke="#e05555" stroke-width="0.5" opacity="0.4"/>
  <text x="155" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a3a5c">English = Subject</text>
  <text x="155" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#e05555" font-weight="bold">I am studying you</text>
  <text x="155" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="22">📖</text>
  <!-- Arrow 1→2 -->
  <line x1="270" y1="170" x2="310" y2="170" stroke="#2d5a88" stroke-width="2.5" marker-end="url(#arr)"/>
  <!-- Stage 2: User (Yellow/Orange) -->
  <rect x="315" y="70" width="230" height="200" rx="6" fill="#ffffff" stroke="#e8a838" stroke-width="2.5"/>
  <rect x="315" y="70" width="230" height="50" rx="6" fill="#e8a838"/>
  <text x="430" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#ffffff" font-weight="bold">English User</text>
  <text x="430" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a3a5c">Stage 2</text>
  <line x1="335" y1="165" x2="525" y2="165" stroke="#e8a838" stroke-width="0.5" opacity="0.4"/>
  <text x="430" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a3a5c">English = Tool</text>
  <text x="430" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#e8a838" font-weight="bold">I use you to get things done</text>
  <text x="430" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="22">🔧</text>
  <!-- Arrow 2→3 -->
  <line x1="545" y1="170" x2="585" y2="170" stroke="#2d5a88" stroke-width="2.5" marker-end="url(#arr)"/>
  <!-- Stage 3: Thinker (Green) -->
  <rect x="590" y="70" width="230" height="200" rx="6" fill="#ffffff" stroke="#50b87a" stroke-width="2.5"/>
  <rect x="590" y="70" width="230" height="50" rx="6" fill="#50b87a"/>
  <text x="705" y="100" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#ffffff" font-weight="bold">English Thinker</text>
  <text x="705" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a3a5c">Stage 3</text>
  <line x1="610" y1="165" x2="800" y2="165" stroke="#50b87a" stroke-width="0.5" opacity="0.4"/>
  <text x="705" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1a3a5c">English = Cognitive Frame</text>
  <text x="705" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#50b87a" font-weight="bold">You are part of me</text>
  <text x="705" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="22">🧠</text>
  <!-- Bottom progression bar -->
  <rect x="120" y="320" width="620" height="8" rx="4" fill="#e0e0e0"/>
  <rect x="120" y="320" width="200" height="8" rx="4" fill="#e05555"/>
  <rect x="320" y="320" width="210" height="8" rx="4" fill="#e8a838"/>
  <rect x="530" y="320" width="210" height="8" rx="4" fill="#50b87a"/>
  <text x="430" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#2d5a88">Continuous Identity Evolution ▸</text>
</svg>