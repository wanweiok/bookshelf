<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 180" width="860" height="180">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2d5a88"/>
    </marker>
  </defs>
  <rect x="20" y="20" width="230" height="140" rx="8" fill="#f0f0f0" stroke="#999" stroke-width="1.5"/>
  <text x="135" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#333">Pre-AI Era</text>
  <text x="135" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#555">Human Knowledge &gt; Machine</text>
  <text x="135" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#555">Humans decide, machines execute</text>
  <line x1="260" y1="90" x2="305" y2="90" stroke="#2d5a88" stroke-width="2.5" marker-end="url(#arr)"/>
  <rect x="315" y="20" width="230" height="140" rx="8" fill="#2d5a88"/>
  <text x="430" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">AI Era</text>
  <text x="430" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#e0e0e0">Machine Knowledge &gt; Human</text>
  <text x="430" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#e0e0e0">Machines generate, humans judge</text>
  <line x1="555" y1="90" x2="600" y2="90" stroke="#2d5a88" stroke-width="2.5" marker-end="url(#arr)"/>
  <rect x="610" y="20" width="230" height="140" rx="8" fill="#1a3a5c"/>
  <text x="725" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#ffffff">Metacognitive Turn</text>
  <text x="725" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#e0e0e0">Advantage shifts</text>
  <text x="725" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#e0e0e0">From "knowing what"</text>
  <text x="725" y="138" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#e0e0e0">to "thinking about knowing"</text>
</svg>