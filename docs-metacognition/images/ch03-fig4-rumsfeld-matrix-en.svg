<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="600" height="400" fill="white"/>

  <rect x="180" y="0" width="180" height="50" rx="8" fill="#1a3a5c"/>
  <text x="270" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="white">Know</text>

  <rect x="360" y="0" width="180" height="50" rx="8" fill="#1a3a5c"/>
  <text x="450" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="white">Don't Know</text>

  <rect x="0" y="60" width="100" height="170" rx="8" fill="#1a3a5c"/>
  <text x="50" y="145" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" transform="rotate(-90, 50, 145)">Known</text>

  <rect x="0" y="240" width="100" height="140" rx="8" fill="#1a3a5c"/>
  <text x="50" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" transform="rotate(-90, 50, 310)">Unknown</text>

  <rect x="110" y="60" width="250" height="170" rx="8" fill="#c8e6c9" stroke="#81c784" filter="url(#shadow)"/>
  <text x="235" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1b5e20">Known Knowns</text>
  <text x="235" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#2e7d32">e.g. 2+2=4</text>

  <rect x="370" y="60" width="220" height="170" rx="8" fill="#fff9c4" stroke="#fff176" filter="url(#shadow)"/>
  <text x="480" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#f57f17">Known Unknowns</text>
  <text x="480" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#f9a825">e.g. Admitting ignorance</text>

  <rect x="110" y="240" width="250" height="140" rx="8" fill="#bbdefb" stroke="#90caf9" filter="url(#shadow)"/>
  <text x="235" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#1565c0">Unknown Knowns</text>
  <text x="235" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#1976d2">e.g. Tacit experience</text>

  <rect x="370" y="240" width="220" height="140" rx="8" fill="#c62828" stroke="#b71c1c" filter="url(#shadow)"/>
  <text x="480" y="295" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">Unknown Unknowns</text>
  <text x="480" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="white">e.g. Black swans</text>
</svg>