<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 120" width="700" height="120">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a3a5c"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="700" height="120" fill="white"/>

  <rect x="30" y="20" width="170" height="80" rx="8" fill="#1a3a5c" filter="url(#shadow)"/>
  <text x="115" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">MECE</text>
  <text x="115" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#d0e0f0">Complete decomposition?</text>

  <line x1="205" y1="60" x2="250" y2="60" stroke="#1a3a5c" stroke-width="2.5" marker-end="url(#arrowhead)"/>

  <rect x="260" y="20" width="170" height="80" rx="8" fill="#2d5a88" filter="url(#shadow)"/>
  <text x="345" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">First Principles</text>
  <text x="345" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#d0e0f0">Remove assumptions?</text>

  <line x1="435" y1="60" x2="480" y2="60" stroke="#1a3a5c" stroke-width="2.5" marker-end="url(#arrowhead)"/>

  <rect x="490" y="20" width="180" height="80" rx="8" fill="#5b9bd5" filter="url(#shadow)"/>
  <text x="580" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">Systems Thinking</text>
  <text x="580" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1a3a5c">Second-order effects?</text>
</svg>