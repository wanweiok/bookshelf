<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 140" width="750" height="140">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1a3a5c"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="750" height="140" fill="white"/>

  <rect x="20" y="75" width="155" height="50" rx="6" fill="#f0f0f0" stroke="#cccccc" stroke-width="1" filter="url(#shadow)"/>
  <text x="97" y="96" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#666666">Level 0 · Factual</text>
  <text x="97" y="113" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#888888">What is X?</text>

  <line x1="180" y1="100" x2="200" y2="100" stroke="#1a3a5c" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="210" y="55" width="155" height="50" rx="6" fill="#5b9bd5" filter="url(#shadow)"/>
  <text x="287" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Level 1 · Causal</text>
  <text x="287" y="93" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#e0eef8">Why does X happen?</text>

  <line x1="370" y1="80" x2="390" y2="80" stroke="#1a3a5c" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="400" y="35" width="155" height="50" rx="6" fill="#2d5a88" filter="url(#shadow)"/>
  <text x="477" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Level 2 · Evaluative</text>
  <text x="477" y="73" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#c0d8f0">Should we care?</text>

  <line x1="560" y1="60" x2="580" y2="60" stroke="#1a3a5c" stroke-width="2" marker-end="url(#arrowhead)"/>

  <rect x="590" y="15" width="145" height="50" rx="6" fill="#1a3a5c" filter="url(#shadow)"/>
  <text x="662" y="36" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Level 3 · Meta</text>
  <text x="662" y="53" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#a0c0e0">Ask something else?</text>
</svg>