<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" width="600" height="280">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="600" height="280" fill="white"/>

  <text x="30" y="28" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#1a3a5c">Attention Allocation Framework</text>

  <text x="30" y="62" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2d5a88">&#9650; High Value</text>
  <rect x="110" y="45" width="220" height="70" rx="8" fill="#1a3a5c" filter="url(#shadow)"/>
  <text x="220" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">Creating</text>
  <text x="220" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#a0c0e0">Original thinking</text>

  <rect x="350" y="45" width="220" height="70" rx="8" fill="#2d5a88" filter="url(#shadow)"/>
  <text x="460" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white">Evaluating</text>
  <text x="460" y="98" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#c0d8f0">Judging AI output</text>

  <line x1="30" y1="135" x2="570" y2="135" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="6,4"/>

  <text x="30" y="172" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#888888">&#9660; Easy Overload</text>
  <rect x="110" y="155" width="220" height="70" rx="8" fill="#f0f0f0" stroke="#cccccc" stroke-width="1" filter="url(#shadow)"/>
  <text x="220" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#555555">Consuming</text>
  <text x="220" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#888888">Absorbing AI content</text>

  <rect x="350" y="155" width="220" height="70" rx="8" fill="#f0f0f0" stroke="#cccccc" stroke-width="1" filter="url(#shadow)"/>
  <text x="460" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#555555">Reacting</text>
  <text x="460" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#888888">Responding to notifications</text>

  <text x="300" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#aaaaaa">Most people spend 80%+ time on Consuming and Reacting</text>
</svg>