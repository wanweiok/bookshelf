<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0d1117;font-family:-apple-system,"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;color:#e6edf3}
.gate{background:#161b22;border:1px solid #30363d;border-radius:16px;padding:48px 40px;max-width:420px;width:90%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.lock{font-size:3rem;margin-bottom:16px;filter:grayscale(.3)}

.input-wrap input:focus{border-color:#7c3aed}
.btn{width:100%;padding:12px;border:none;border-radius:8px;background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;font-size:.95rem;cursor:pointer;font-weight:600;transition:opacity .2s}
.btn:hover{opacity:.9}
.btn:active{transform:scale(.98)}
.err{color:#f85149;font-size:.82rem;margin-top:12px;min-height:20px;transition:opacity .3s}
.err.hide{opacity:0}
.loading{display:none;margin-top:12px;color:#8b949e;font-size:.82rem}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #30363d;border-top-color:#7c3aed;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}

var ITER = 100000;

function b64decode(s) {
  var bin = atob(s), arr = new Uint8Array(bin.length);
  for (var i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

async function deriveKey(pw, salt) {
  var enc = new TextEncoder();
  var km = await crypto.subtle.importKey("raw", enc.encode(pw), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: salt, iterations: ITER, hash: "SHA-256" },
    km,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
}

async function tryDecrypt(pw) {
  var salt = b64decode(ENC.salt);
  var iv   = b64decode(ENC.iv);
  var ct   = b64decode(ENC.ct);
  var key  = await deriveKey(pw, salt);
  var dec  = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, ct);
  return new TextDecoder().decode(dec);
}

async function unlock() {
  var pw = document.getElementById("pw").value;
  if (!pw) return;
  var errEl = document.getElementById("err");
  var loadEl = document.getElementById("loading");
  errEl.classList.add("hide");
  loadEl.style.display = "block";
  try {
    var html = await tryDecrypt(pw);
    sessionStorage.setItem("book-pw", pw);
    document.open();
    document.write(html);
    document.close();
  } catch(e) {
    loadEl.style.display = "none";
    errEl.classList.remove("hide");
    document.getElementById("pw").select();
  }
}

(async function() {
  var cached = sessionStorage.getItem("book-pw");
  if (!cached) return;
  try {
    var html = await tryDecrypt(cached);
    document.open();
    document.write(html);
    document.close();
  } catch(e) {
    sessionStorage.removeItem("book-pw");
  }
})();
</script>
