<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>合力：预测的底层逻辑</title>
<style>
:root {
  --bg: #ffffff; --text: #1a1a2e; --sidebar-bg: #f8f9fa; --sidebar-text: #333;
  --accent: #4361ee; --accent-hover: #3a56d4; --border: #e0e0e0;
  --code-bg: #f5f5f5; --blockquote-bg: #f0f4ff; --blockquote-border: #4361ee;
  --table-header: #f0f4ff; --table-border: #d0d0d0; --shadow: rgba(0,0,0,0.08);
  --nav-hover: #e8edff; --nav-active: #4361ee; --nav-active-text: #fff;
  --part-title: #666; --muted: #888;
}
[data-theme="dark"] {
  --bg: #0d1117; --text: #c9d1d9; --sidebar-bg: #161b22; --sidebar-text: #c9d1d9;
  --accent: #58a6ff; --accent-hover: #79b8ff; --border: #30363d;
  --code-bg: #1c2128; --blockquote-bg: #1c2433; --blockquote-border: #58a6ff;
  --table-header: #1c2433; --table-border: #30363d; --shadow: rgba(0,0,0,0.3);
  --nav-hover: #1c2433; --nav-active: #58a6ff; --nav-active-text: #0d1117;
  --part-title: #8b949e; --muted: #8b949e;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg); color: var(--text); transition: background 0.3s, color 0.3s; }

/* Password Gate */
#gate { display: flex; justify-content: center; align-items: center; min-height: 100vh;
  background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #1c2433 100%); }
.gate-box { text-align: center; padding: 3rem; border-radius: 16px;
  background: rgba(255,255,255,0.05); backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1); max-width: 400px; width: 90%; }
.gate-box h1 { color: #58a6ff; font-size: 2rem; margin-bottom: 0.5rem; }
.gate-box .sub { color: #8b949e; margin-bottom: 2rem; font-size: 0.95rem; }
.gate-box input { width: 100%; padding: 12px 16px; border-radius: 8px; border: 1px solid #30363d;
  background: #0d1117; color: #c9d1d9; font-size: 1.1rem; text-align: center;
  letter-spacing: 4px; outline: none; margin-bottom: 1rem; }
.gate-box input:focus { border-color: #58a6ff; box-shadow: 0 0 0 3px rgba(88,166,255,0.15); }
.gate-box button { width: 100%; padding: 12px; border-radius: 8px; border: none;
  background: #58a6ff; color: #0d1117; font-size: 1rem; font-weight: 600;
  cursor: pointer; transition: all 0.2s; }
.gate-box button:hover { background: #79b8ff; transform: translateY(-1px); }
.gate-error { color: #f85149; margin-top: 0.5rem; font-size: 0.9rem; display: none; }

/* Layout */
#app-container { display: none; }
#sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 300px; background: var(--sidebar-bg);
  border-right: 1px solid var(--border); overflow-y: auto; z-index: 100;
  transition: transform 0.3s, background 0.3s; display: flex; flex-direction: column; }
.sidebar-header { padding: 1.5rem; border-bottom: 1px solid var(--border); text-align: center; }
.sidebar-header h2 { font-size: 1.5rem; color: var(--accent); }
.subtitle { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }
.nav-links { flex: 1; overflow-y: auto; padding: 0.5rem 0; }
.nav-part { margin-bottom: 0.5rem; }
.nav-part-title { padding: 0.6rem 1.2rem; font-size: 0.75rem; text-transform: uppercase;
  letter-spacing: 1px; color: var(--part-title); font-weight: 700; }
.nav-item { display: block; padding: 0.5rem 1.2rem; color: var(--sidebar-text);
  text-decoration: none; font-size: 0.88rem; border-radius: 6px; margin: 2px 8px;
  transition: all 0.15s; line-height: 1.4; }
.nav-item:hover { background: var(--nav-hover); }
.nav-item.active { background: var(--nav-active); color: var(--nav-active-text); font-weight: 600; }
.sidebar-footer { padding: 1rem; border-top: 1px solid var(--border); text-align: center; }
#theme-toggle { background: none; border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 16px; cursor: pointer; font-size: 1.2rem; color: var(--text);
  transition: all 0.2s; }
#theme-toggle:hover { background: var(--nav-hover); }

/* Content */
#content { margin-left: 300px; min-height: 100vh; }
#reader { max-width: 780px; margin: 0 auto; padding: 2rem 2.5rem 4rem; }
#menu-btn { display: none; position: fixed; top: 12px; left: 12px; z-index: 200;
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 12px; font-size: 1.2rem; cursor: pointer; color: var(--text);
  box-shadow: 0 2px 8px var(--shadow); }

/* Typography */
.chapter { display: none; animation: fadeIn 0.3s; }
.chapter.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
.chapter h1 { font-size: 1.8rem; margin: 0 0 0.5rem; color: var(--accent); line-height: 1.3;
  padding-bottom: 0.5rem; border-bottom: 2px solid var(--border); }
.chapter h2 { font-size: 1.35rem; margin: 2.5rem 0 1rem; color: var(--text); }
.chapter h3 { font-size: 1.1rem; margin: 2rem 0 0.8rem; }
.chapter p { line-height: 1.85; margin: 0.8rem 0; font-size: 1rem; }
.chapter strong { color: var(--accent); }
.chapter a { color: var(--accent); }
.chapter ul, .chapter ol { padding-left: 1.5rem; margin: 0.8rem 0; }
.chapter li { line-height: 1.75; margin: 0.3rem 0; }
.chapter blockquote { margin: 1.2rem 0; padding: 1rem 1.2rem; background: var(--blockquote-bg);
  border-left: 4px solid var(--blockquote-border); border-radius: 0 8px 8px 0;
  font-style: normal; }
.chapter blockquote p { margin: 0.4rem 0; }
.chapter code { background: var(--code-bg); padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
.chapter pre { background: var(--code-bg); padding: 1rem; border-radius: 8px; overflow-x: auto;
  margin: 1rem 0; border: 1px solid var(--border); }
.chapter pre code { background: none; padding: 0; }
.chapter table { width: 100%; border-collapse: collapse; margin: 1.2rem 0; font-size: 0.92rem; }
.chapter th { background: var(--table-header); padding: 10px 12px; text-align: left;
  border: 1px solid var(--table-border); font-weight: 600; }
.chapter td { padding: 10px 12px; border: 1px solid var(--table-border); line-height: 1.5; }
.chapter tr:hover td { background: var(--nav-hover); }
.chapter hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }

/* Chapter bottom nav */
#chapter-nav-bottom { max-width: 780px; margin: 0 auto; padding: 0 2.5rem 3rem;
  display: flex; justify-content: space-between; gap: 1rem; }
#chapter-nav-bottom button { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--sidebar-bg); color: var(--text); cursor: pointer; font-size: 0.95rem;
  transition: all 0.2s; }
#chapter-nav-bottom button:hover { background: var(--nav-hover); border-color: var(--accent); }
#chapter-nav-bottom button:disabled { opacity: 0.3; cursor: not-allowed; }

/* Mermaid placeholder */
.chapter pre code.language-mermaid { display: block; text-align: center; color: var(--muted);
  font-style: italic; white-space: pre-wrap; }

/* Mobile */
@media (max-width: 768px) {
  #sidebar { transform: translateX(-100%); width: 280px; box-shadow: 4px 0 20px var(--shadow); }
  #sidebar.open { transform: translateX(0); }
  #content { margin-left: 0; }
  #menu-btn { display: block; }
  #reader { padding: 3.5rem 1.2rem 4rem; }
  #chapter-nav-bottom { padding: 0 1.2rem 3rem; }
  .chapter h1 { font-size: 1.4rem; }
}
</style>
</head>

  <div class="gate-box">
    <h1>合力</h1>
    <p class="sub">预测的底层逻辑</p>
    <input type="password" id="pwd" placeholder="请输入密码" autofocus>
    <button onclick="unlock()">进入阅读</button>
    <p class="gate-error" id="err">密码错误，请重试</p>
  </div>
</div>

function unlock() {
  const pwd = document.getElementById('pwd').value;
  try {
    const bytes = CryptoJS.AES.decrypt(ENC, pwd);
    const html = bytes.toString(CryptoJS.enc.Utf8);
    if (!html || html.length < 100) throw new Error();
    document.getElementById('gate').style.display = 'none';
    document.getElementById('book-root').innerHTML = html;
    document.getElementById('app-container').style.display = 'flex';
    initBook();
  } catch(e) {
    document.getElementById('err').style.display = 'block';
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }
}
document.getElementById('pwd').addEventListener('keydown', e => { if(e.key==='Enter') unlock(); });

function initBook() {
  const chapters = document.querySelectorAll('.chapter');
  const navItems = document.querySelectorAll('.nav-item');
  let current = 0;

  function showChapter(idx) {
    chapters.forEach(c => c.classList.remove('active'));
    navItems.forEach(n => n.classList.remove('active'));
    chapters[idx].classList.add('active');
    navItems[idx].classList.add('active');
    current = idx;
    window.scrollTo(0, 0);
    updateBottomNav();
    navItems[idx].scrollIntoView({ block: 'nearest' });
    // close mobile sidebar
    document.getElementById('sidebar').classList.remove('open');
  }

  function updateBottomNav() {
    const bottom = document.getElementById('chapter-nav-bottom');
    const prevTitle = current > 0 ? navItems[current-1].textContent : '';
    const nextTitle = current < chapters.length-1 ? navItems[current+1].textContent : '';
    bottom.innerHTML = '<button id="prev-btn"'+(current===0?' disabled':'')+'>← '+prevTitle+'</button>'
      + '<button id="next-btn"'+(current===chapters.length-1?' disabled':'')+'>'+nextTitle+' →</button>';
    document.getElementById('prev-btn').onclick = () => { if(current>0) showChapter(current-1); };
    document.getElementById('next-btn').onclick = () => { if(current<chapters.length-1) showChapter(current+1); };
  }

  navItems.forEach((item, i) => {
    item.addEventListener('click', e => { e.preventDefault(); showChapter(i); });
  });

  // Theme
  const saved = localStorage.getItem('book-theme');
  if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
  document.getElementById('theme-toggle').addEventListener('click', () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
    localStorage.setItem('book-theme', isDark ? 'light' : 'dark');
  });

  // Menu
  document.getElementById('menu-btn').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
  });

  // Keyboard
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' && current < chapters.length-1) showChapter(current+1);
    if (e.key === 'ArrowLeft' && current > 0) showChapter(current-1);
  });

  showChapter(0);
}
</script>
